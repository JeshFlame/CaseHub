server {
    listen 80;
    server_name casehub.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name casehub.online;
    
    ssl_certificate /etc/letsencrypt/live/casehub.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casehub.online/privkey.pem;
    ssl_protocols TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    
    root /var/www/html;
    index index.html;

    charset utf-8;
    charset_types text/html text/css application/javascript application/json;   
   
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /2WS {
        proxy_pass http://127.0.0.1:50123;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
}
